<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="jjTech 登录入口，融合霓虹粒子、毛玻璃和动态交互的前端登录页面。"
    />
    <meta name="theme-color" content="#090b1f" />
    <title>jjTech - 登录</title>
    <link rel="stylesheet" href="assets/css/login.css" />
    <script type="module" src="assets/js/login.js" defer></script>
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <div class="orb orb-one" aria-hidden="true"></div>
    <div class="orb orb-two" aria-hidden="true"></div>
    <div class="orb orb-three" aria-hidden="true"></div>

    <main class="login-shell">
      <section class="brand-panel" aria-label="jjTech 品牌介绍">
        <a class="brand" href="./" aria-label="jjTech 首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <path d="M32 4 58 18.5v27L32 60 6 45.5v-27L32 4Z" />
              <path d="M21 25.5 32 19l11 6.5v13L32 45l-11-6.5v-13Z" />
              <path d="M32 19v26M21 25.5l22 13M43 25.5l-22 13" />
            </svg>
          </span>
          <span>jjTech</span>
        </a>
        <p class="eyebrow">Next-generation workspace</p>
        <h1>连接你的智能工作流</h1>
        <p class="brand-copy">
          进入 jjTech 控制台，体验更快、更稳、更具未来感的数字协作入口。
        </p>
        <div class="signal-grid" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>

      <section class="card-wrap" aria-label="登录表单">
        <form class="login-card" id="login-form" aria-labelledby="login-title" novalidate>
          <div class="card-glow" aria-hidden="true"></div>
          <div class="form-heading">
            <p class="eyebrow">Secure access</p>
            <h2 id="login-title">欢迎回来</h2>
            <p>输入账号信息，开启今天的高效旅程。</p>
          </div>

          <div class="field-group">
            <label for="username">账号 / 邮箱</label>
            <div class="input-shell">
              <input
                id="username"
                name="username"
                type="text"
                autocomplete="username"
                placeholder=" "
                required
              />
              <span class="floating-label">请输入账号或邮箱</span>
              <span class="field-line" aria-hidden="true"></span>
            </div>
          </div>

          <div class="field-group">
            <label for="password">密码</label>
            <div class="input-shell password-shell">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder=" "
                minlength="6"
                required
              />
              <span class="floating-label">请输入至少 6 位密码</span>
              <button
                class="password-toggle"
                type="button"
                aria-label="显示密码"
                aria-pressed="false"
              >
                <span class="eye-icon" aria-hidden="true"></span>
              </button>
              <span class="field-line" aria-hidden="true"></span>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember" />
              <span>记住我</span>
            </label>
            <a href="#forgot">忘记密码？</a>
          </div>

          <p class="form-error" id="form-error" role="alert" aria-live="polite"></p>

          <button class="submit-button" type="submit" data-state="idle">
            <span class="button-text">登录控制台</span>
            <span class="button-loader" aria-hidden="true"></span>
            <span class="button-check" aria-hidden="true"></span>
          </button>

          <div class="divider"><span>或使用演示入口</span></div>

          <div class="quick-actions" aria-label="第三方登录演示入口">
            <button type="button" disabled title="演示页面暂未连接第三方登录">GitHub</button>
            <button type="button" disabled title="演示页面暂未连接第三方登录">WeChat</button>
          </div>

          <p class="signup-tip">还没有账号？<a href="#signup">立即注册</a></p>
        </form>
      </section>
    </main>

    <noscript>
      <p class="noscript-notice">当前浏览器未启用 JavaScript，动态特效和演示登录状态将不可用。</p>
    </noscript>
  </body>
</html>
